# ─────────────────────────────────────────────────────────────────────────────
# Claude IRC Bot — Example Configuration
#
# Copy this file to config.ini and fill in your values.
# Owner: root:<botuser>   Permissions: 640
#
# Default network: irc.scuttled.net (2600net) on TLS port 6697
# Change [network] and [irc] to point at any IRC network you run.
# ─────────────────────────────────────────────────────────────────────────────


# ─────────────────────────────────────────────────────────────────────────────
# Network identity
# This is used in the bot's self-introduction and system prompt.
# ─────────────────────────────────────────────────────────────────────────────
[network]

# Human-readable name of your IRC network
name               = 2600net

# Optional one-line description shown in the bot's system context
description        = A hacker/tech IRC network at irc.scuttled.net


# ─────────────────────────────────────────────────────────────────────────────
# IRC connection
# ─────────────────────────────────────────────────────────────────────────────
[irc]

# IRC server hostname — default: 2600net
server             = irc.scuttled.net

# TLS port (standard: 6697). Plain-text port is usually 6667 but is NOT
# recommended — always use TLS to protect your API key and NickServ password
# from being sniffed on the wire.
port               = 6697

# The bot's nick on IRC
nick               = ClaudeBot

# Ident / username field
ident              = claude

# GECOS / real name shown in /whois
realname           = Claude AI Bot (Anthropic)

# Channels to join on connect, comma-separated.
# Channels listed under [chanserv] managed_channels are joined automatically too.
channels           = #ClaudeBot

# How users address the bot in a channel:
#   trigger prefix:    !claude <question>
#   direct mention:    ClaudeBot: <question>   or   ClaudeBot, <question>
# Private messages always work regardless of these settings.
trigger            = !claude
respond_to_mention = true


# ─────────────────────────────────────────────────────────────────────────────
# NickServ  (Anope services — present on most modern networks)
# Leave password blank to skip all NickServ interaction.
# ─────────────────────────────────────────────────────────────────────────────
[nickserv]

# Password for the bot's IRC nick.
# If the nick is not yet registered and auto_register = true, the bot will
# register it automatically on first connect.
password           = ChangeThisToAStrongPassword

# Email address used when auto-registering the nick.
# Use a real, deliverable address — some networks require email verification.
email              = yourbot@yourdomain.example

# Set to false if you want to register the nick manually before first run.
auto_register      = true


# ─────────────────────────────────────────────────────────────────────────────
# ChanServ  (Anope services)
# Leave managed_channels blank to disable ChanServ management entirely.
# ─────────────────────────────────────────────────────────────────────────────
[chanserv]

# Channels the bot should own via ChanServ (comma-separated).
# The bot will register them if unregistered, keep the topic alive,
# op itself, and apply the access list below.
managed_channels   = #ClaudeBot

# Topic ChanServ will restore after splits / restarts
topic              = Powered by Claude AI | ClaudeBot: <question>  or  !claude <question>

# Automatically register unregistered managed channels on join
auto_register      = true

# Static access list applied on setup.
# Format: nick:level,nick:level
# Anope xOP levels:  25=VOP  40=HOP  50=AOP  75=SOP  100=QOP (founder)
access_list        = r0d3nt:100


# ─────────────────────────────────────────────────────────────────────────────
# Bot admin settings
# ─────────────────────────────────────────────────────────────────────────────
[bot]

# Comma-separated list of IRC nicks authorised to use !bot commands.
# These nicks should be identified with NickServ for security.
admins             = r0d3nt


# ─────────────────────────────────────────────────────────────────────────────
# Security & flood protection
# ─────────────────────────────────────────────────────────────────────────────
[security]

# Minimum seconds a user must wait between requests (5 is a safe public default)
user_cooldown_seconds        = 5

# Violations before warning the user
warn_after_violations        = 3

# Violations before temporarily ignoring the user
temp_ignore_after_violations = 6

# How long (seconds) a temp-ignore lasts
temp_ignore_seconds          = 120

# Output token bucket — max burst before rate-limiting outbound messages
output_burst                 = 5

# Minimum seconds between outgoing messages once burst is exhausted
output_rate_seconds          = 1.2

# Max simultaneous Anthropic API calls (prevents thread explosion under flood)
max_concurrent_api_calls     = 4

# Max input length accepted from users (characters, after stripping control codes)
max_input_length             = 400

# Permanent ignore list: nicks, hostmasks, or wildcards — comma-separated
# Example: SpamBot, *!*@badhost.example.com, Flood*
# permanent_ignore =


# ─────────────────────────────────────────────────────────────────────────────
# Anthropic API
# ─────────────────────────────────────────────────────────────────────────────
[anthropic]

# Your Anthropic API key — https://console.anthropic.com
# Keep this file chmod 640 — never commit it to version control.
api_key            = sk-ant-YOUR_API_KEY_HERE

# Claude model to use
model              = claude-sonnet-4-20250514

# Max tokens per response (IRC truncates at 6 lines — 1024 is plenty)
max_tokens         = 1024

# Conversation history kept per channel / PM context
max_history_messages = 20

# Optional: fully override the system prompt.
# If left commented out, a sensible IRC-optimised prompt is generated
# automatically using the network name and bot nick from config.
# system_prompt = You are ClaudeBot on MyNetwork IRC. Be concise and plain-text.


# ─────────────────────────────────────────────────────────────────────────────
# AI-generated rotating topic
# ─────────────────────────────────────────────────────────────────────────────
[topic]

# Let Claude write fresh channel topics automatically
ai_enabled          = true

# Hours between topic rotations (0 = set once on join, never change again)
rotate_every_hours  = 6

# Static text always prepended to every topic — e.g. your network name
# prefix            = MyNetwork

# Text appended after the AI-generated core (usage hint)
# Leave commented to use the default which shows the trigger/mention syntax.
# suffix            = ClaudeBot: <question>  or  !claude <question>


# ─────────────────────────────────────────────────────────────────────────────
# NickServ profile  (/whois and NickServ INFO enrichment)
# ─────────────────────────────────────────────────────────────────────────────
[nickserv_profile]

# URL shown in /whois output (NickServ SET URL)
url                 = https://github.com/2600net/claude-irc-bot

# Greeting shown in NickServ INFO (NickServ SET GREET, max ~200 chars)
greet               = Hi! I'm ClaudeBot, a Claude AI assistant. Say 'ClaudeBot: <question>' or '!claude <question>' to chat!

# Hide the registration email in NickServ INFO output
hide_email          = true


# ─────────────────────────────────────────────────────────────────────────────
# Privacy notice on new user join
# ─────────────────────────────────────────────────────────────────────────────
[privacy_notice]

# Send a one-time channel notice when a new nick joins a channel the bot is in.
# Reminds users that messages to the bot leave the IRC network and go to
# Anthropic's Claude API. Fires once per nick per session; suppressed during
# the quiet period after the bot first joins (prevents startup flood).
enabled                = true

# How many seconds after bot-join before newcomer notices start firing.
# 90 seconds is enough for most servers to finish sending the full member list.
quiet_period_seconds   = 90

# Notice text. Available placeholders:
#   {nick}     — the new user's nick
#   {bot}      — this bot's nick
#   {network}  — IRC network name (from [network] name)
#   {channel}  — the channel they joined
message = Welcome, {nick}! Heads up: this channel has an AI assistant ({bot}). Messages sent to {bot} are processed by Anthropic's Claude API (a third-party service). Please don't share anything private. Info: https://www.anthropic.com/privacy
